name: Deploy WorkSupport-AI to EC2

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build Spring Boot App
      run: mvn clean package -DskipTests

    - name: Copy JAR to EC2
      uses: appleboy/scp-action@v0.1.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        source: "target/*.jar"
        target: "/home/ubuntu/WorkSupport-AI/"

    - name: Deploy and Run Application
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |

          set +e

          echo "Stopping old application..."
          pkill -f 'java -jar'

          echo "Moving new JAR to root..."
          mv /home/ubuntu/WorkSupport-AI/target/*.jar /home/ubuntu/WorkSupport-AI/ 2>/dev/null

          echo "Cleaning old JAR files (keeping latest)..."
          cd /home/ubuntu/WorkSupport-AI/
          ls -t *.jar 2>/dev/null | tail -n +2 | xargs -r rm --

          echo "Starting new application..."
          nohup java -jar /home/ubuntu/WorkSupport-AI/*.jar > /home/ubuntu/WorkSupport-AI/app.log 2>&1 &

          echo "Deployment completed successfully!"
